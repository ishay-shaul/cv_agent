<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Agent</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-shell">
        <header>
            <h1>CV Agent</h1>
        </header>
        <main>
            <section class="panel panel-top">
                <label for="question-input">Ask a question:</label>
                <textarea id="question-input" placeholder="Type your question here..."></textarea>
                <button id="ask-button">Ask Agent</button>
            </section>
            <section class="panel panel-bottom">
                <label for="answer-output">Agent answer:</label>
                <div id="answer-output" class="answer-box">Your answer will appear here.</div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
